name: ataraxia

services:
  # ============================================================
  # Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: ataraxia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345678}
      POSTGRES_DB: ${DB_NAME:-ataraxia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./API/bd.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ataraxia}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ataraxia-net

  # ============================================================
  # API Backend
  # ============================================================
  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: ataraxia-api
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ataraxia}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345678}
      JWT_SECRET: ${JWT_SECRET:-tu_contraseña_secreta}
      EMAIL_USER: ${EMAIL_USER:-smarturutcv@gmail.com}
      EMAIL_PASS: ${EMAIL_PASS:-lihichglnpzlhddg}
      FRONTEND_URL: http://plataforma:5173,http://landing:4321,http://localhost:${PLATAFORMA_HOST_PORT:-8080},http://localhost:${LANDING_HOST_PORT:-4322},http://${VPS_IP:-localhost},http://${VPS_IP:-localhost}:${PLATAFORMA_HOST_PORT:-8080},http://${VPS_IP:-localhost}:${LANDING_HOST_PORT:-4322}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-77253773974-b412uvcqhrqmchhtdq5rq6tl81hpados.apps.googleusercontent.com}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-dke5fhmpk}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-759781756841837}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-h3Ke76Ry-XlJeHbhBG3SZHdS6I8}
      IMAGE_MODERATION_MODE: ${IMAGE_MODERATION_MODE:-required}
      IMAGE_MODERATION_PROVIDER: ${IMAGE_MODERATION_PROVIDER:-sightengine}
      SIGHTENGINE_API_USER: ${SIGHTENGINE_API_USER:-}
      SIGHTENGINE_API_SECRET: ${SIGHTENGINE_API_SECRET:-}
      SIGHTENGINE_NUDITY_THRESHOLD: ${SIGHTENGINE_NUDITY_THRESHOLD:-0.55}
      SIGHTENGINE_OFFENSIVE_THRESHOLD: ${SIGHTENGINE_OFFENSIVE_THRESHOLD:-0.6}
      SIGHTENGINE_SUBSTANCE_THRESHOLD: ${SIGHTENGINE_SUBSTANCE_THRESHOLD:-0.75}
      MODELO_URL: http://modelo:8000
      ML_AUTO_RETRAIN: ${ML_AUTO_RETRAIN:-1}
      ML_RETRAIN_DEBOUNCE_MS: ${ML_RETRAIN_DEBOUNCE_MS:-45000}
      ML_RETRAIN_TIMEOUT_MS: ${ML_RETRAIN_TIMEOUT_MS:-120000}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ataraxia-net

  # ============================================================
  # ML Model Service
  # ============================================================
  modelo:
    build:
      context: ./MODELO
      dockerfile: Dockerfile
    container_name: ataraxia-modelo
    restart: unless-stopped
    environment:
      POI_DB_HOST: postgres
      POI_DB_PORT: 5432
      POI_DB_NAME: ${DB_NAME:-ataraxia}
      POI_DB_USER: ${DB_USER:-postgres}
      POI_DB_PASSWORD: ${DB_PASSWORD:-12345678}
      SKIP_MODEL_BOOT: ${SKIP_MODEL_BOOT:-0}
      WELLNESS_SYNC_DB: ${WELLNESS_SYNC_DB:-1}
      CORS_ORIGINS: "http://localhost:${PLATAFORMA_HOST_PORT:-8080},http://localhost:3000,http://${VPS_IP:-localhost},http://${VPS_IP:-localhost}:${PLATAFORMA_HOST_PORT:-8080},http://${VPS_IP:-localhost}:${API_HOST_PORT:-4100}"
    volumes:
      - ./MODELO/data/wellness:/app/data/wellness
      - ./MODELO/models:/app/models
      - ./MODELO/scripts:/app/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/docs", timeout=5)']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - ataraxia-net

  # ============================================================
  # Platform (Dashboard) Frontend
  # ============================================================
  plataforma:
    build:
      context: ./PLATAFORMA
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://${VPS_IP:-localhost}:${API_HOST_PORT:-4100}/api/v2
        VITE_MODELO_URL: http://${VPS_IP:-localhost}:${MODELO_HOST_PORT:-8100}
        VITE_BUSINESS_URL: http://${VPS_IP:-localhost}:${LANDING_HOST_PORT:-4322}/
    container_name: ataraxia-plataforma
    restart: unless-stopped
    environment:
      VITE_API_URL: http://${VPS_IP:-localhost}:${API_HOST_PORT:-4100}/api/v2
      VITE_BUSINESS_URL: http://${VPS_IP:-localhost}:${LANDING_HOST_PORT:-4322}/
      VITE_MODELO_URL: http://${VPS_IP:-localhost}:${MODELO_HOST_PORT:-8100}
    depends_on:
      - api
    networks:
      - ataraxia-net

  # ============================================================
  # Landing Page Frontend
  # ============================================================
  landing:
    build:
      context: ./LANDING
      dockerfile: Dockerfile
      args:
        PUBLIC_TOURIST_APP_URL: http://${VPS_IP:-localhost}:${PLATAFORMA_HOST_PORT:-8080}/
        PUBLIC_API_URL: http://${VPS_IP:-localhost}:${API_HOST_PORT:-4100}/api/v2
    container_name: ataraxia-landing
    restart: unless-stopped
    environment:
      PUBLIC_TOURIST_APP_URL: http://${VPS_IP:-localhost}:${PLATAFORMA_HOST_PORT:-8080}/
    depends_on:
      - plataforma
    networks:
      - ataraxia-net

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: ataraxia-nginx
    restart: unless-stopped
    ports:
      - '${PLATAFORMA_HOST_PORT:-8080}:8080'
      - '${LANDING_HOST_PORT:-4322}:4322'
      - '${API_HOST_PORT:-4100}:4100'
      - '${MODELO_HOST_PORT:-8100}:8100'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - plataforma
      - landing
      - api
    networks:
      - ataraxia-net

networks:
  ataraxia-net:
    driver: bridge

volumes:
  postgres_data:
    name: ataraxia_postgres_data
