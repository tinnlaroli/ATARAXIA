services:
  api:
    build:
      context: ./API
      dockerfile: Dockerfile.dev
    image: smartur-api-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ./API:/app
      - /app/node_modules

  plataforma:
    build:
      context: ./PLATAFORMA
      dockerfile: Dockerfile.dev
    image: smartur-plataforma-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "1"
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./PLATAFORMA:/app
      - /app/node_modules

  landing:
    build:
      context: ./LANDING
      dockerfile: Dockerfile.dev
    image: smartur-landing-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4321"
    environment:
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ./LANDING:/app
      - /app/node_modules

  modelo:
    build:
      context: ./MODELO
      dockerfile: Dockerfile
    image: ataraxia-modelo-dev
    working_dir: /app/src
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./MODELO:/app
