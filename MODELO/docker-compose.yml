name: ataraxia-modelo

services:
  modelo:
    build: .
    image: ataraxia-modelo:local
    container_name: ataraxia-modelo
    ports:
      - "${MODELO_HOST_PORT:-8100}:8000"
    restart: unless-stopped
    # Primera vez: si falta el RF entrenado, el arranque puede tardar varios minutos.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
